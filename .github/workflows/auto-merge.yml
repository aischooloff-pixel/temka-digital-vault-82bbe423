name: Auto-merge Codex PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-merge:
    if: >
      contains(github.event.pull_request.title, 'codex') ||
      contains(github.event.pull_request.title, 'feat(') ||
      contains(github.event.pull_request.title, 'fix(')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Enable auto-merge
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
